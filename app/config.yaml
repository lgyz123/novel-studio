project_name: novel-studio
language: zh-CN

paths:
  manifest_dir: 00_manifest
  inputs_dir: 01_inputs
  working_dir: 02_working
  locked_dir: 03_locked
  prompts_dir: prompts
  context_dir: 02_working/context

agent:
  name: single-agent
  mode: prototype
  validate_local_models_on_start: true

writer:
  provider: deepseek
  model: deepseek-chat
  base_url: https://api.deepseek.com
  api_key_env: MY_DEEPSEEK_API_KEY

reviewer:
  provider: deepseek
  model: deepseek-chat
  base_url: https://api.deepseek.com
  api_key_env: MY_DEEPSEEK_API_KEY
  num_ctx: 6144
  temperature: 0.0
  request_timeout: 1200
  num_predict: 700
  reference_num_predict: 400
  refine_num_predict: 500
  task_max_chars: 1600
  chapter_state_max_chars: 1600
  based_on_max_chars: 1400
  draft_max_chars: 2000

supervisor:
  enabled: true
  model: deepseek-chat
  base_url: https://api.deepseek.com
  api_key_env: MY_DEEPSEEK_API_KEY
  request_timeout: 120
  max_retries: 3
  retry_backoff_base: 1.0
  scene_type_policy:
    max_consecutive_weak_scenes: 2
    weak_scene_types: [atmosphere, transition, reflection]
    forced_after_weak_streak: [discovery, decision, consequence, confrontation, reveal]
    min_type_ratios:
      discovery: 0.20
      decision: 0.15
      consequence: 0.10
    combined_min_type_ratios:
      reveal_or_relationship_shift:
        types: [reveal, relationship_shift]
        ratio: 0.10
    combined_max_type_ratios:
      weak_scenes:
        types: [atmosphere, transition, reflection]
        ratio: 0.30

generation:
  compile_num_ctx: 4096
  write_num_ctx: 6144
  writer_context_max_chars: 8000
  temperature: 0.25
  request_timeout: 900
  preferred_length_override: 1500-2600字
  deepseek_takeover_enabled: true
  deepseek_takeover_after_local_fallbacks: 2
  deepseek_takeover_request_timeout: 180
  deepseek_takeover_num_predict: 1800
  max_auto_revisions: 5
  # 本地 reviewer / writer 默认更早交给 supervisor，避免在低质量 revise loop 里空转太久
  local_manual_intervention_after: 3
  auto_continue_until_scene: 15
  max_supervisor_rounds: 8
  supervisor_rescue_draft_enabled: true

run:
  mode: continue
  start_chapter: 1
  start_scene: 11
  target_chapter: 1
  target_scene: 15
  max_scenes_per_chapter:
  restart_from_task: ""

output:
  working_dir: 02_working
  context_file: 02_working/context/current_context.md
  review_dir: 02_working/reviews
  draft_dir: 02_working/drafts
