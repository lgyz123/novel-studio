project_name: novel-studio
language: zh-CN

paths:
  manifest_dir: 00_manifest
  inputs_dir: 01_inputs
  working_dir: 02_working
  locked_dir: 03_locked
  prompts_dir: prompts
  context_dir: 02_working/context

agent:
  name: single-agent
  mode: prototype

writer:
  model: qwen3:14b
  base_url: http://192.168.1.11:11434

reviewer:
  model: gpt-oss:20b
  base_url: http://192.168.1.11:11434
  num_ctx: 2048
  request_timeout: 900

generation:
  compile_num_ctx: 2048
  write_num_ctx: 2048
  temperature: 0.4
  request_timeout: 600

output:
  working_dir: 02_working
  context_file: 02_working/context/current_context.md
  review_dir: 02_working/reviews
  draft_dir: 02_working/drafts